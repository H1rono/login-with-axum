name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo build
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --all -- --check

  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install --frozen --node-modules-dir=manual
      - run: deno fmt --check
      - run: deno lint client
      - run: deno task --frozen --node-modules-dir=manual build

  ghcr-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - id: setup-buildx
        uses: docker/setup-buildx-action@v4
      - id: cache
        uses: actions/cache@v5
        with:
          path: cache-mount
          key: cache-mount-${{ hashFiles('docker/Dockerfile') }}
      - uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mount
          dockerfile: ./docker/Dockerfile
          skip-extractions: ${{ steps.cache.outputs.cache-hit }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: .
          provenance: false
          file: ./docker/Dockerfile
          push: ${{ github.ref_name == 'main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64,linux/ppc64le,linux/s390x
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:cache-latest
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:cache-latest,mode=max
